name: Deploy to GitHub Pages

# Build and deploy on every push to master (and manually via the Actions tab).
# The Supabase anon key is baked in at build time from repo state, as before —
# no secrets are needed (the anon key is public; RLS guards all writes).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; don't cancel a running production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # The anon key lives in repo *settings* (an Actions secret), not in the
          # source tree. It's baked into the public bundle at build time — that's
          # fine: the anon key is public by design and RLS guards all writes.
          VITE_SUPABASE_URL: https://ycfnpvwintoadppxyfdo.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
